name: CI

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      TURBO_TELEMETRY_DISABLED: 1
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run type-check

      - name: Unit tests + coverage
        run: npm run test:coverage

      - name: Build
        run: npm run build
        env:
          # Prisma generate + Next build (Clerk factice : pas de validation au build)
          DATABASE_URL: postgresql://user:pass@localhost:5432/db
          CLERK_SECRET_KEY: sk_test_placeholder
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_placeholder

  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: quality
    env:
      TURBO_TELEMETRY_DISABLED: 1
      # `secrets` n'est pas autorisé dans `if:` — on mappe ici pour tester avec `env.*`
      CLERK_PUBLISHABLE_KEY: ${{ secrets.CLERK_PUBLISHABLE_KEY }}
      CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: E2E désactivé (secrets Clerk manquants)
        if: ${{ env.CLERK_PUBLISHABLE_KEY == '' || env.CLERK_SECRET_KEY == '' }}
        run: |
          echo "::notice::Configure les secrets CLERK_PUBLISHABLE_KEY et CLERK_SECRET_KEY pour lancer les E2E."

      - name: Build web (clés Clerk pour E2E)
        if: ${{ env.CLERK_PUBLISHABLE_KEY != '' && env.CLERK_SECRET_KEY != '' }}
        run: npm run build --workspace=@questia/web
        env:
          DATABASE_URL: postgresql://user:pass@localhost:5432/db
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ env.CLERK_PUBLISHABLE_KEY }}
          CLERK_SECRET_KEY: ${{ env.CLERK_SECRET_KEY }}

      - name: Install Playwright (Chromium)
        if: ${{ env.CLERK_PUBLISHABLE_KEY != '' && env.CLERK_SECRET_KEY != '' }}
        run: npx playwright install --with-deps chromium
        working-directory: apps/web

      - name: E2E (Playwright)
        if: ${{ env.CLERK_PUBLISHABLE_KEY != '' && env.CLERK_SECRET_KEY != '' }}
        run: npm run test:e2e -w @questia/web
        env:
          CI: true
          DATABASE_URL: postgresql://user:pass@localhost:5432/db
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ env.CLERK_PUBLISHABLE_KEY }}
          CLERK_SECRET_KEY: ${{ env.CLERK_SECRET_KEY }}
